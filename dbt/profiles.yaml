weather_project:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      user: "{{ env_var('POSTGRES_USER', 'airflow') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'airflow') }}"
      port: 5432
      dbname: "{{ env_var('POSTGRES_DB', 'weather_db') }}"
      schema: dbt_models
      threads: 4
      keepalives_idle: 0
      connect_timeout: 10