version: 2

sources:
  - name: raw
    schema: public
    tables:
      - name: weather_data
        identifier: raw_weather_data
        description: "Сырые данные о погоде из OpenWeather API"

models:
  - name: stg_weather
    description: "Очищенные погодные данные с категориями"
    columns:
      - name: city
        tests:
          - not_null
      - name: date
        tests:
          - not_null
      - name: temperature
        tests:
          - not_null